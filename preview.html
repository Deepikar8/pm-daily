        { rank: 4, name: 'Diego M.', role: 'PM, Mercado Libre', score: 5, time: '2:44', streak: 54, avatar: '#5C4634' },
        { rank: 5, name: 'Jamal W.', role: 'PM, Linear', score: 4, time: '1:55', streak: 38, avatar: '#D2691E' },
        { rank: 6, name: 'Priya S.', role: 'Sr. PM, Airbnb', score: 4, time: '2:12', streak: 44, avatar: '#8B7355' },
        { rank: 7, name: 'Tomás V.', role: 'PM Lead, Rappi', score: 4, time: '2:38', streak: 31, avatar: '#A0522D' },

          const interval = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 1000);
          return () => clearInterval(interval);
        }
      }, [screen, startTime]);

      const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

      const startQuiz = () => {
        setScreen('quiz'); setStartTime(Date.now());
        setCurrentQ(0); setAnswers([]); setSelected(null); setRevealed(false);
      };
      const handleSelect = (idx) => {
        if (revealed) return;
        setSelected(idx); setRevealed(true);
        const correct = idx === today.questions[currentQ].correct;
        setAnswers([...answers, { questionIdx: currentQ, selected: idx, correct }]);
      };
      const next = () => {
        if (currentQ < today.questions.length - 1) {
          setCurrentQ(currentQ + 1); setSelected(null); setRevealed(false);
        } else { setScreen('results'); }
      };

      return (
        <div style={{ fontFamily: '"Fraunces", Georgia, serif', backgroundColor: '#FBF7F0', minHeight: '100vh', color: '#2A1810' }}>
          {/* PREVIEW-ONLY screen jumper */}
          <div style={{ background: '#2A1810', color: '#FBF7F0', padding: '6px 12px', fontFamily: 'ui-monospace, monospace', fontSize: '11px', display: 'flex', gap: '6px', alignItems: 'center', flexWrap: 'wrap' }}>

                    Settings
                  </div>
                  {[
                    { label: 'Display name', val: 'Aditi M.', action: 'Edit' },
                    { label: 'Timezone', val: 'America/Los_Angeles', action: 'Edit' },
                    { label: 'Calendar invite', val: 'Re-download to update timezone', action: 'Download .ics' },
                  ].map((s, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 20px', borderBottom: i < 2 ? '1px solid #E5D9C4' : 'none' }}>
                      <div>
                        <div className="sans" style={{ fontSize: '11px', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#8B7355', marginBottom: '2px' }}>{s.label}</div>
                        <div className="serif" style={{ fontSize: '14px', fontWeight: 600, color: '#2A1810' }}>{s.val}</div>
                      </div>
                      <button className="sans" style={{ background: 'transparent', border: '1.5px solid #2A1810', borderRadius: '8px', padding: '6px 12px', fontSize: '12px', fontWeight: 700, color: '#2A1810', cursor: 'pointer' }}>
                        {s.action}
                      </button>
                    </div>
                  ))}
                </div>

                {/* Privacy */}
                <div style={{ backgroundColor: '#FBF1DC', borderRadius: '14px', border: '2px solid #8B7355', overflow: 'hidden', marginBottom: '14px' }}>
                  <div className="sans" style={{ padding: '12px 20px', borderBottom: '1.5px solid #8B7355', fontSize: '11px', fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#5C4634' }}>
                    Privacy & data
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 20px', borderBottom: '1px solid #E5D9C4' }}>
                    <div>
                      <div className="serif" style={{ fontSize: '14px', fontWeight: 700, color: '#2A1810' }}>Download my data</div>
                      <div className="sans" style={{ fontSize: '11px', color: '#8B7355', marginTop: '2px' }}>JSON export · profile, sessions, answers</div>
                    </div>
                    <button className="sans" style={{ background: 'transparent', border: '1.5px solid #2A1810', borderRadius: '8px', padding: '6px 12px', fontSize: '12px', fontWeight: 700, color: '#2A1810', cursor: 'pointer' }}>
                      Export
                    </button>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 20px' }}>
                    <div>
                      <div className="serif" style={{ fontSize: '14px', fontWeight: 700, color: '#B84A2A' }}>Delete my account</div>
                      <div className="sans" style={{ fontSize: '11px', color: '#8B7355', marginTop: '2px' }}>Anonymizes your sessions; you'll lose access immediately</div>
                    </div>
                    <button className="sans" style={{ background: 'transparent', border: '1.5px solid #B84A2A', borderRadius: '8px', padding: '6px 12px', fontSize: '12px', fontWeight: 700, color: '#B84A2A', cursor: 'pointer' }}>
                      Delete
                    </button>
                  </div>
                </div>

                <div style={{ textAlign: 'center', padding: '12px', borderTop: '1px solid #E5D9C4', marginTop: '16px' }}>
                  <button className="sans" style={{ background: 'transparent', border: 'none', color: '#8B7355', fontSize: '13px', cursor: 'pointer' }}>Sign out</button>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    createRoot(document.getElementById("root")).render(<LennyDailyQuiz />);
  </script>

name = "pm-daily"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Static assets served directly by the runtime
[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"
# Avoid serving _worker.js as a static file
not_found_handling = "single-page-application"
# SvelteKit routes must execute in the Worker for SSR, auth redirects, and
# server load functions. Keep hashed static assets on the direct asset path.
run_worker_first = ["/*", "!/_app/*", "!/robots.txt"]

[[d1_databases]]
binding = "DB"
database_name = "pm-daily"
database_id = "4ed77142-3bd9-4a1b-9378-e8b527266066"
migrations_dir = "src/lib/server/db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "845380d9438543e8a62871db136ddca0"

[[vectorize]]
binding = "VECTORIZE"
index_name = "lennys_metadata"

[[durable_objects.bindings]]
name = "QUIZ_SESSION"
class_name = "QuizSession"
# script_name omitted: DO lives in this same Worker

[[migrations]]
tag = "v1"
new_sqlite_classes = ["QuizSession"]

[triggers]
crons = ["*/5 * * * *"]

[observability]
enabled = true
